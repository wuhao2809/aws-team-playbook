name: terraform-apply

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve account ID
        id: aws
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "account=$ACCOUNT" >> "$GITHUB_OUTPUT"

      # Build & push the container only when the app changed. The
      # image tag is the commit SHA so each apply pins a specific
      # version of the code.
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin \
              ${{ steps.aws.outputs.account }}.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push image
        env:
          REPO: ${{ steps.aws.outputs.account }}.dkr.ecr.us-east-1.amazonaws.com/teamgram-app
          TAG: ${{ github.sha }}
        run: |
          docker build -t "$REPO:$TAG" ./app
          docker push "$REPO:$TAG"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false -var "image_tag=${{ github.sha }}"

      - name: Show wall URL
        working-directory: terraform
        run: terraform output -raw alb_dns_name
