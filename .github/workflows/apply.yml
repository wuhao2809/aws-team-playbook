name: terraform-apply

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "lambda/**"
      - "terraform/**"
      - ".github/workflows/apply.yml"

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Resolve account ID
        id: aws
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "account=$ACCOUNT" >> "$GITHUB_OUTPUT"

      # The ECR repo was created by ./bootstrap.sh; we just push to it.
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-west-2 \
            | docker login --username AWS --password-stdin \
              ${{ steps.aws.outputs.account }}.dkr.ecr.us-west-2.amazonaws.com

      - name: Build and push image
        env:
          REPO: ${{ steps.aws.outputs.account }}.dkr.ecr.us-west-2.amazonaws.com/teamgram-app
          TAG: ${{ github.sha }}
        run: |
          docker build -t "$REPO:$TAG" ./app
          docker push "$REPO:$TAG"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Generate backend config from secrets
        working-directory: terraform
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_STATE_BUCKET }}"
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
          region         = "us-west-2"
          EOF

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false -var "image_tag=${{ github.sha }}"

      - name: Show wall URL
        working-directory: terraform
        run: terraform output -raw alb_dns_name
